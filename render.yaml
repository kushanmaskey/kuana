services:
  - type: web
    name: kuana-app
    runtime: node
    plan: starter
    buildCommand: npm run build && cd server && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kuana-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SETUP_KEY
        generateValue: true
      - key: PORT
        value: 5000

databases:
  - name: kuana-db
    plan: starter
    databaseName: kuana
